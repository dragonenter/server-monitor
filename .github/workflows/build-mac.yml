name: Build macOS DMG

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PySide6 psutil py2app

      - name: Install desktop package into site-packages
        run: |
          # 核心修复：把 desktop 包安装到 site-packages，让 py2app 能正确追踪
          SITE=$(python3 -c "import site; print(site.getsitepackages()[0])")
          echo "Installing desktop to: $SITE/desktop"
          cp -r desktop "$SITE/desktop"
          # 验证
          python3 -c "from desktop.ui.main_window import MonitorMainWindow; print('Import OK')"
          python3 -c "from desktop.ui.charts import SmoothLineChart; print('Charts OK')"
          python3 -c "from desktop.collectors.system import SystemCollector; print('Collector OK')"

      - name: Build app bundle with py2app
        run: python setup_mac.py py2app

      - name: Rename app bundle
        run: |
          APP_PATH=$(ls -d dist/*.app | head -1)
          if [ "$APP_PATH" != "dist/ServerMonitor.app" ]; then
            mv "$APP_PATH" dist/ServerMonitor.app
          fi

      - name: Strip unused Qt libraries
        run: |
          FRAMEWORKS="dist/ServerMonitor.app/Contents/Resources/lib/python3.11/PySide6/Qt/lib"
          if [ -d "$FRAMEWORKS" ]; then
            for f in "$FRAMEWORKS"/Qt*.framework; do
              name=$(basename "$f" .framework)
              case "$name" in
                QtCore|QtGui|QtWidgets|QtDBus|QtPrintSupport) ;;
                *) echo "Removing $name" && rm -rf "$f" ;;
              esac
            done
          fi
          find dist/ServerMonitor.app -path "*/plugins/multimedia" -exec rm -rf {} + 2>/dev/null || true
          find dist/ServerMonitor.app -path "*/plugins/sqldrivers" -exec rm -rf {} + 2>/dev/null || true
          find dist/ServerMonitor.app -path "*/plugins/designer" -exec rm -rf {} + 2>/dev/null || true
          find dist/ServerMonitor.app -path "*/plugins/qmltooling" -exec rm -rf {} + 2>/dev/null || true
          find dist/ServerMonitor.app -name "translations" -type d -exec rm -rf {} + 2>/dev/null || true
          echo "App bundle size:"
          du -sh dist/ServerMonitor.app

      - name: Verify bundle contents
        run: |
          echo "=== desktop package in bundle ==="
          find dist/ServerMonitor.app/Contents/Resources -path "*/desktop/ui/*" -name "*.py" | sort
          FOUND=$(find dist/ServerMonitor.app/Contents/Resources -name "main_window.py" | head -1)
          if [ -z "$FOUND" ]; then
            echo "ERROR: desktop modules missing from bundle!"
            find dist/ServerMonitor.app/Contents/Resources -name "*.py" | head -30
            exit 1
          fi
          echo "OK: $FOUND"

      - name: Ad-hoc code sign
        run: |
          xattr -cr dist/ServerMonitor.app
          codesign --force --deep --sign - dist/ServerMonitor.app

      - name: Create DMG
        run: |
          sleep 5
          # 使用 -nospotlight -noanyowners 避免 resource busy
          hdiutil create -volname "Server Monitor" \
            -srcfolder dist/ServerMonitor.app \
            -ov -format UDRW -nospotlight \
            /tmp/ServerMonitor_rw.dmg
          sleep 3
          hdiutil convert /tmp/ServerMonitor_rw.dmg \
            -format UDZO -o ServerMonitor.dmg
          echo "DMG size:"
          ls -lh ServerMonitor.dmg

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ServerMonitor-dmg
          path: ServerMonitor.dmg

      - name: Upload DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ServerMonitor.dmg
