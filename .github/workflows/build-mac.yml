name: Build macOS DMG

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PySide6 psutil py2app

      - name: Install desktop package locally
        run: |
          # 让 py2app 能找到 desktop 包
          pip install -e .

      - name: Build app bundle with py2app
        run: python setup_mac.py py2app

      - name: Inject desktop package into bundle
        run: |
          # py2app 对本地包支持不好，手动复制确保打入 bundle
          RESOURCES="dist/$(ls dist/ | head -1)/Contents/Resources"
          if [ ! -d "$RESOURCES/desktop" ]; then
            echo "Copying desktop package into bundle..."
            cp -r desktop "$RESOURCES/desktop"
          fi
          echo "Verifying..."
          ls "$RESOURCES/desktop/ui/"

      - name: Rename app bundle
        run: |
          APP_PATH=$(ls -d dist/*.app | head -1)
          if [ "$APP_PATH" != "dist/ServerMonitor.app" ]; then
            mv "$APP_PATH" dist/ServerMonitor.app
          fi

      - name: Strip unused Qt libraries
        run: |
          FRAMEWORKS="dist/ServerMonitor.app/Contents/Resources/lib/python3.11/PySide6/Qt/lib"
          if [ -d "$FRAMEWORKS" ]; then
            for f in "$FRAMEWORKS"/Qt*.framework; do
              name=$(basename "$f" .framework)
              case "$name" in
                QtCore|QtGui|QtWidgets|QtDBus|QtPrintSupport) ;;
                *) echo "Removing $name" && rm -rf "$f" ;;
              esac
            done
          fi
          # 只删确定不需要的插件（保留 platforms、styles、imageformats）
          find dist/ServerMonitor.app -path "*/plugins/multimedia" -exec rm -rf {} + 2>/dev/null || true
          find dist/ServerMonitor.app -path "*/plugins/sqldrivers" -exec rm -rf {} + 2>/dev/null || true
          find dist/ServerMonitor.app -path "*/plugins/designer" -exec rm -rf {} + 2>/dev/null || true
          find dist/ServerMonitor.app -path "*/plugins/qmltooling" -exec rm -rf {} + 2>/dev/null || true
          find dist/ServerMonitor.app -name "translations" -type d -exec rm -rf {} + 2>/dev/null || true
          echo "App bundle size:"
          du -sh dist/ServerMonitor.app

      - name: Debug app structure
        run: |
          echo "=== Resources dir ==="
          ls dist/ServerMonitor.app/Contents/Resources/ | head -20
          echo "=== Python path contents ==="
          find dist/ServerMonitor.app/Contents/Resources -maxdepth 2 -name "desktop" -o -name "ui" | head -10
          echo "=== Plugins ==="
          find dist/ServerMonitor.app -path "*/plugins/*" -type d | sort -u
          echo "=== Main script ==="
          head -5 dist/ServerMonitor.app/Contents/Resources/__boot__.py 2>/dev/null || echo "no __boot__.py"

      - name: Verify desktop package bundled
        run: |
          echo "=== Checking desktop package ==="
          find dist/ServerMonitor.app/Contents/Resources -name "main_window*" -o -name "charts*" -o -name "system*" | head -20
          # 验证关键模块存在
          FOUND=$(find dist/ServerMonitor.app/Contents/Resources -name "main_window*" | head -1)
          if [ -z "$FOUND" ]; then
            echo "ERROR: desktop package not bundled!"
            echo "=== Full Resources listing ==="
            find dist/ServerMonitor.app/Contents/Resources -name "*.py" -o -name "*.pyc" | head -50
            exit 1
          fi
          echo "Desktop package found: $FOUND"

      - name: Smoke test (import check)
        run: |
          RESOURCES="dist/ServerMonitor.app/Contents/Resources"
          PYTHONPATH="${RESOURCES}:${RESOURCES}/lib/python3.11" python3 -c "import desktop.ui.charts; import desktop.collectors.system; print('All imports OK')" || {
            echo "Import test failed"; cat ~/Desktop/ServerMonitor_crash.log 2>/dev/null || true; exit 1
          }

      - name: Ad-hoc code sign
        run: |
          # 移除 quarantine 属性 + ad-hoc 签名，防止 "已损坏" 提示
          xattr -cr dist/ServerMonitor.app
          codesign --force --deep --sign - dist/ServerMonitor.app
          echo "Code sign done"

      - name: Create DMG
        run: |
          # 先创建临时 DMG 再转换，避免 "Resource busy" 问题
          hdiutil create -volname "Server Monitor" \
            -srcfolder dist/ServerMonitor.app \
            -ov -format UDRW \
            /tmp/ServerMonitor_rw.dmg
          sleep 2
          hdiutil convert /tmp/ServerMonitor_rw.dmg \
            -format UDZO -o ServerMonitor.dmg

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ServerMonitor-dmg
          path: ServerMonitor.dmg

      - name: Upload DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ServerMonitor.dmg
