name: Build macOS DMG

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PySide6 psutil py2app

      - name: Build app bundle with py2app
        run: python setup_mac.py py2app

      - name: Rename app bundle
        run: |
          APP_PATH=$(ls -d dist/*.app | head -1)
          if [ "$APP_PATH" != "dist/ServerMonitor.app" ]; then
            mv "$APP_PATH" dist/ServerMonitor.app
          fi

      - name: Strip unused Qt libraries
        run: |
          FRAMEWORKS="dist/ServerMonitor.app/Contents/Resources/lib/python3.11/PySide6/Qt/lib"
          if [ -d "$FRAMEWORKS" ]; then
            # 只保留 QtCore, QtGui, QtWidgets, QtDBus(QtWidgets依赖)
            for f in "$FRAMEWORKS"/Qt*.framework; do
              name=$(basename "$f" .framework)
              case "$name" in
                QtCore|QtGui|QtWidgets|QtDBus) ;;
                *) echo "Removing $name" && rm -rf "$f" ;;
              esac
            done
          fi
          # 删除 Qt 翻译文件、多余插件
          find dist/ServerMonitor.app -name "translations" -type d -exec rm -rf {} + 2>/dev/null || true
          find dist/ServerMonitor.app -path "*/plugins/multimedia" -exec rm -rf {} + 2>/dev/null || true
          find dist/ServerMonitor.app -path "*/plugins/sqldrivers" -exec rm -rf {} + 2>/dev/null || true
          find dist/ServerMonitor.app -path "*/plugins/designer" -exec rm -rf {} + 2>/dev/null || true
          find dist/ServerMonitor.app -path "*/plugins/qmltooling" -exec rm -rf {} + 2>/dev/null || true
          # 显示最终大小
          echo "App bundle size:"
          du -sh dist/ServerMonitor.app

      - name: Create DMG
        run: |
          # 先创建临时 DMG 再转换，避免 "Resource busy" 问题
          hdiutil create -volname "Server Monitor" \
            -srcfolder dist/ServerMonitor.app \
            -ov -format UDRW \
            /tmp/ServerMonitor_rw.dmg
          sleep 2
          hdiutil convert /tmp/ServerMonitor_rw.dmg \
            -format UDZO -o ServerMonitor.dmg

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ServerMonitor-dmg
          path: ServerMonitor.dmg

      - name: Upload DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ServerMonitor.dmg
